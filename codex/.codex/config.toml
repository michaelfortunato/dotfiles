approval_policy = "on-request"
approvals_reviewer = "user"
ask_for_approval = "always"
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
network_access = true
personality = "pragmatic"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "read-only"
service_tier = "fast"
suppress_unstable_features_warning = true
web_search = "live"

[features]
codex_hooks = true
multi_agent = true
steer = true
memories = true
chronicle = false

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.fetch]
command = "uvx"
args = ["mcp-server-fetch"]

[mcp_servers.fetch.tools.fetch]
approval_mode = "approve"

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.memory.tools.add_observations]
approval_mode = "approve"

[mcp_servers.memory.tools.create_entities]
approval_mode = "approve"

[mcp_servers.memory.tools.create_relations]
approval_mode = "approve"

[mcp_servers.memory.tools.read_graph]
approval_mode = "approve"

[mcp_servers.sequential_thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
enabled = true

[mcp_servers.sequential_thinking.tools.sequentialthinking]
approval_mode = "approve"

[mcp_servers.github]
bearer_token_env_var = "CODEX_GITHUB_PERSONAL_ACCESS_TOKEN"
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.github.tools.create_pull_request]
approval_mode = "approve"

[mcp_servers.github.tools.update_pull_request]
approval_mode = "approve"

[notice]
hide_full_access_warning = true
"hide_gpt-5.1-codex-max_migration_prompt" = true
hide_gpt5_1_migration_prompt = true
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.1-codex-mini" = "gpt-5.2-codex"
"gpt-5.2" = "gpt-5.3-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"

[plugins."github@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."linear@openai-curated"]
enabled = true

[plugins."slack@openai-curated"]
